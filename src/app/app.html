<div class="app-container">
  <!-- Top Navigation / Control Bar -->
  <header class="top-bar glass">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <h1>LogicSim</h1>
    </div>

    <div class="controls">
      @if (isRunning()) {
        <button class="btn btn-pause" (click)="pause()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          Pause
        </button>
      } @else {
        <button class="btn btn-play" (click)="play()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Play
        </button>
      }
      <button class="btn btn-danger" (click)="reset()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        Reset
      </button>
    </div>
  </header>

  <div class="workspace">
    <!-- Left Panel: Components Palette -->
    <aside class="palette glass">
      <h2>Components</h2>
      <div class="palette-group">
        @for (item of paletteItems; track item.type) {
          <div 
            class="palette-item" 
            draggable="true"
            (dragstart)="onDragStart($event, item.type)">
            <div class="icon">
              <!-- Placeholder simple icon based on type -->
              @if (item.type === 'SWITCH') {
                <span class="dot input"></span>
              } @else if (item.type === 'LED') {
                <span class="dot output"></span>
              } @else {
                <span class="shape gate"></span>
              }
            </div>
            <span>{{ item.label }}</span>
          </div>
        }
      </div>
    </aside>

    <!-- Main Center Area: Board -->
    <main class="main-area" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
      <app-board />
    </main>
  </div>
</div>
